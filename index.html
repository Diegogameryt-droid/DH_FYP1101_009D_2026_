<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Está Abierto el Súper?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">
        <h1 class="app-title">🏪 Estado de Supermercados</h1>
        
        <div class="form-group">
            <label class="form-label">1. Selecciona tu Comuna</label>
            <select id="select-comuna" class="form-select">
                <option value="">-- Elige una comuna --</option>
            </select>
        </div>

        <div class="form-group hidden" id="wrapper-supermercado">
            <label class="form-label">2. Selecciona el Supermercado</label>
            <select id="select-supermercado" class="form-select">
                <option value="">-- Elige un local --</option>
            </select>
        </div>

        <div id="resultado" class="resultado-box hidden">
            <h2 id="res-nombre"></h2>
            <p id="res-direccion"></p>
            
            <div id="res-badge"></div>
            
            <p id="res-horario"></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
